<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hello-panel" aria-labelledby="main-title">
      <p class="eyebrow">A tiny static website</p>
      <h1 id="main-title">Hello World</h1>
      <p class="subtitle">Simple, clean, and ready for whatever you want to build next.</p>
      <button class="spark-button" type="button" aria-label="Refresh the greeting">
        Refresh greeting
      </button>
      <p class="microcopy" id="daily-note" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
